<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>IntentLock — History</title>
  <link rel="stylesheet" href="newtab.css">
</head>
<body class="options">
  <div class="options-container">
    <div class="header">
      <h1>Session history</h1>
      <p>A record of your past sessions and patterns.</p>
    </div>

    <div id="insights" class="section hidden">
      <h2>Patterns</h2>
      <div id="insights-content"></div>
    </div>

    <div id="history-list"></div>

    <div id="empty-state" class="hidden">
      <p class="no-session">No sessions recorded yet.</p>
      <p class="no-session">Complete a session to see it here.</p>
    </div>
  </div>

  <script src="history.js"></script>
</body>
</html>
